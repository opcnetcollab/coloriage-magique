version: "3.9"

services:
  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    container_name: coloriage-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - jobs_data:/tmp/coloriage-jobs
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://coloriage-magique.srv1465877.hstgr.cloud
    container_name: coloriage-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: coloriage-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  jobs_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /tmp/coloriage-jobs
