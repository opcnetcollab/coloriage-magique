version: "3.9"

services:
  api:
    image: ghcr.io/opcnetcollab/coloriage-magique-api:latest
    container_name: coloriage-api
    restart: unless-stopped
    volumes:
      - jobs_data:/tmp/coloriage-jobs
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  web:
    image: ghcr.io/opcnetcollab/coloriage-magique-web:latest
    container_name: coloriage-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: coloriage-nginx
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api
      - web
    command:
      - /bin/sh
      - -c
      - |
        printf 'server {\n  listen 80;\n  server_name _;\n  location /api/ {\n    proxy_pass http://coloriage-api:8000/api/;\n    proxy_set_header Host $$http_host;\n    proxy_set_header X-Real-IP $$remote_addr;\n    client_max_body_size 25M;\n  }\n  location / {\n    proxy_pass http://coloriage-web:3000;\n    proxy_set_header Host $$http_host;\n    proxy_set_header X-Real-IP $$remote_addr;\n  }\n}\n' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'

volumes:
  jobs_data:
